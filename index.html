<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CeneSI – Primerjava cen</title>
<script src="catalog_data.js" onerror="window.CATALOG_DATA=undefined"></script>
<style>
:root{
  --lidl:#0050AA;--lidl-y:#FFD700;--hofer:#E2001A;--spar:#007A33;--leclerc:#003882;--mercator:#CC0033;
  --best:#16a34a;--best-bg:#f0fdf4;--bg:#f1f5f9;--card:#fff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;--shadow:0 2px 10px rgba(0,0,0,.08);
  --accent:#f59e0b;--danger:#dc2626;--info:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:15px 20px 11px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.logo{font-size:20px;font-weight:800;letter-spacing:-.5px;cursor:pointer;text-decoration:none;color:#fff;display:flex;align-items:center;gap:5px;}
.logo span{color:var(--accent);}
.home-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;}
.home-btn:hover{background:rgba(255,255,255,.22);}
.badges{display:flex;gap:5px;flex-wrap:wrap;}
.badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800;}
.b-lidl{background:var(--lidl);color:var(--lidl-y);}.b-hofer{background:var(--hofer);color:#fff;}
.b-spar{background:var(--spar);color:#fff;}.b-leclerc{background:var(--leclerc);color:#fff;}.b-mercator{background:var(--mercator);color:#fff;}
.data-ts{font-size:11px;color:rgba(255,255,255,.4);margin-left:auto;}
.cart-btn{background:var(--accent);color:#1e293b;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;cursor:pointer;display:none;}
.search-row{display:flex;gap:7px;flex-wrap:wrap;}
.sw{position:relative;flex:1;min-width:160px;}
.sw input{width:100%;padding:8px 12px 8px 34px;border:none;border-radius:8px;font-size:13px;background:rgba(255,255,255,.13);color:#fff;outline:none;}
.sw input::placeholder{color:rgba(255,255,255,.4);}
.sw input:focus{background:rgba(255,255,255,.22);}
.sw .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;}
.sel{padding:8px 11px;border:none;border-radius:8px;font-size:12px;background:rgba(255,255,255,.13);color:#fff;cursor:pointer;outline:none;}
.sel option{background:#1e293b;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:5px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--text);}
.tab-count{background:#f1f5f9;color:var(--muted);font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;}
.tab.active .tab-count{background:var(--text);color:#fff;}

/* CATEGORY BAR */
.cat-bar{display:flex;gap:6px;padding:12px 18px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{padding:5px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .15s;}
.cat-btn:hover{border-color:#94a3b8;color:var(--text);}
.cat-btn.active{background:var(--text);border-color:var(--text);color:#fff;}

/* MAIN */
main{padding:16px 16px 60px;max-width:1160px;margin:0 auto;}
.info-bar{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.demo-notice{background:#fef3c7;border-left:4px solid var(--accent);padding:10px 16px;font-size:13px;color:#92400e;margin-bottom:16px;border-radius:0 8px 8px 0;display:flex;align-items:center;gap:8px;}

/* SEGMENT GRID */
.seg-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(500px,1fr));}

/* SEGMENT CARD */
.seg-card{background:var(--card);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .2s,transform .2s;}
.seg-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.12);transform:translateY(-1px);}
.seg-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.seg-emoji{font-size:24px;flex-shrink:0;}
.seg-title{font-size:14px;font-weight:700;}
.seg-desc{font-size:11px;color:var(--muted);margin-top:1px;}

.store-cells{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:9px 11px 11px;}
.sn-mercator{color:var(--mercator);}
.dc-mercator::before{background:var(--mercator);}
.sc{border-radius:9px;padding:8px 5px 6px;text-align:center;border:2px solid transparent;position:relative;transition:all .15s;}
.sc.best{border-color:var(--best);background:var(--best-bg);}
.sc.na{opacity:.45;}
.best-tag{position:absolute;top:-7px;left:50%;transform:translateX(-50%);background:var(--best);color:#fff;font-size:8px;font-weight:800;padding:1px 6px;border-radius:10px;white-space:nowrap;letter-spacing:.4px;}
.sc-store{font-size:9px;font-weight:800;letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase;}
.sc-store.lidl{color:var(--lidl);}.sc-store.hofer{color:var(--hofer);}.sc-store.spar{color:var(--spar);}.sc-store.leclerc{color:var(--leclerc);}
.sc-name{font-size:9px;color:var(--muted);min-height:22px;line-height:1.2;margin-bottom:2px;}
.sc-w{font-size:9px;color:var(--muted);}
.sc-price{font-size:17px;font-weight:800;line-height:1;margin:3px 0 1px;}
.sc-price.promo{color:var(--danger);}
.sc-orig{font-size:10px;color:var(--muted);text-decoration:line-through;}
.sc-unit{font-size:9px;color:var(--muted);}
.sc-na{font-size:11px;color:#cbd5e1;margin-top:14px;}
.sc-add{margin-top:5px;background:var(--text);color:#fff;border:none;border-radius:6px;font-size:9px;font-weight:700;padding:3px 0;cursor:pointer;width:100%;}
.sc-add:hover{background:#475569;}
.sc-add.added{background:var(--best);}

.seg-foot{padding:6px 14px;background:#f8fafc;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);}
.save-pct{font-weight:700;color:var(--best);}

/* RAW TABLE */
.raw-section{margin-bottom:22px;}
.raw-section h3{font-size:13px;font-weight:700;padding:8px 13px;border-radius:9px 9px 0 0;color:#fff;}
.h-lidl{background:var(--lidl);}.h-hofer{background:var(--hofer);}.h-spar{background:var(--spar);}.h-leclerc{background:var(--leclerc);}.h-mercator{background:var(--mercator);}
.rtable{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 9px 9px;overflow:hidden;box-shadow:var(--shadow);}
.rtable th{background:#f8fafc;font-size:11px;text-align:left;padding:6px 11px;border-bottom:1px solid var(--border);}
.rtable td{font-size:12px;padding:5px 11px;border-bottom:1px solid #f1f5f9;}
.rtable tr:hover td{background:#f8fafc;}
.add-row-btn{background:none;border:1px solid var(--border);border-radius:5px;font-size:10px;padding:2px 7px;cursor:pointer;color:var(--muted);}
.add-row-btn:hover{background:var(--text);color:#fff;border-color:var(--text);}

/* SHOPPING LIST */
.shop-layout{display:grid;grid-template-columns:290px 1fr;gap:16px;align-items:start;}
@media(max-width:760px){.shop-layout{grid-template-columns:1fr;}}
.profile-card{background:var(--card);border-radius:13px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.profile-card h3{padding:11px 15px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:13px;}
.profile-body{padding:13px 15px;display:flex;flex-direction:column;gap:12px;}
.pf-group label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.pf-btns{display:flex;gap:4px;flex-wrap:wrap;}
.pf-btn,.person-btn{padding:4px 11px;border-radius:7px;border:2px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);}
.pf-btn:hover,.person-btn:hover{border-color:#94a3b8;color:var(--text);}
.pf-btn.active,.person-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
.person-btn{width:34px;height:34px;padding:0;text-align:center;font-size:13px;}
.persons-row{display:flex;gap:5px;}
.reco-card{background:var(--card);border-radius:13px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.reco-card h3{padding:10px 15px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:13px;display:flex;align-items:center;justify-content:space-between;}
.reco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--border);}
.reco-item{background:#fff;padding:9px 11px;}
.reco-name{font-size:11px;font-weight:600;margin-top:2px;line-height:1.2;}
.reco-qty{font-size:13px;font-weight:800;margin-top:2px;}
.reco-add{margin-top:5px;background:#f1f5f9;border:none;border-radius:6px;font-size:10px;font-weight:700;padding:4px 8px;cursor:pointer;color:var(--muted);width:100%;}
.reco-add:hover{background:var(--text);color:#fff;}
.reco-toggle{font-size:11px;color:var(--muted);cursor:pointer;border:none;background:none;font-weight:600;}
.list-card{background:var(--card);border-radius:13px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.list-hdr{padding:11px 15px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.list-hdr h3{font-size:13px;}
.list-actions{display:flex;gap:7px;flex-wrap:wrap;}
.shop-mode-btn{padding:5px 13px;border-radius:8px;border:2px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.shop-mode-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
.clear-btn{padding:4px 11px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;color:var(--muted);cursor:pointer;}
.clear-btn:hover{border-color:var(--danger);color:var(--danger);}
.list-empty{padding:36px;text-align:center;color:var(--muted);}
.list-item{display:flex;align-items:center;gap:9px;padding:10px 15px;border-bottom:1px solid #f1f5f9;transition:background .15s;}
.list-item:hover{background:#f8fafc;}
.list-item.checked{opacity:.5;}
.list-item.checked .li-name{text-decoration:line-through;color:var(--muted);}
.li-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.li-check.checked{background:var(--best);border-color:var(--best);color:#fff;font-size:11px;}
.li-main{flex:1;min-width:0;}
.li-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-meta{font-size:10px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px;}
.li-store-tag{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;color:#fff;}
.li-saving{color:var(--best);font-weight:700;}
.li-qty{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.qty-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.qty-btn:hover{background:var(--text);color:#fff;}
.qty-val{font-size:13px;font-weight:700;min-width:18px;text-align:center;}
.li-price{font-size:13px;font-weight:800;flex-shrink:0;min-width:52px;text-align:right;}
.li-del{background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:15px;padding:2px;border-radius:4px;}
.li-del:hover{color:var(--danger);}
.add-form{padding:11px 15px;border-top:2px dashed var(--border);background:#fafafa;}
.add-form-row{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end;}
.add-form input,.add-form select{padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:12px;outline:none;}
.add-form input:focus,.add-form select:focus{border-color:var(--info);}
.fi-name{flex:2;min-width:120px;}
.fi-qty{width:65px;}
.fi-price{width:85px;}
.fi-store{width:105px;}
.add-form-btn{padding:7px 14px;background:var(--text);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
.summary-bar{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;border-radius:0 0 13px 13px;padding:13px 16px;}
.summary-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sum-item{text-align:center;}
.sum-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.4px;}
.sum-value{font-size:19px;font-weight:800;line-height:1.2;}
.sum-value.green{color:#4ade80;}
.sum-value.yellow{color:var(--accent);}
.progress-bar{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:9px;overflow:hidden;}
.progress-fill{height:100%;background:#4ade80;border-radius:3px;transition:width .3s;}
.setup-banner{background:var(--card);border-radius:14px;border:2px dashed var(--border);padding:20px 22px;}
.setup-banner h2{font-size:16px;margin-bottom:13px;}
.step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.step:last-child{border:none;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--text);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-body h3{font-size:13px;margin-bottom:3px;}
.step-body p{font-size:12px;color:var(--muted);line-height:1.5;}
.store-folder{padding:9px 11px;border-radius:8px;border:2px solid var(--border);font-size:12px;font-weight:700;text-align:center;}
.sf-lidl{border-color:var(--lidl);color:var(--lidl);}.sf-hofer{border-color:var(--hofer);color:var(--hofer);}
.sf-spar{border-color:var(--spar);color:var(--spar);}.sf-leclerc{border-color:var(--leclerc);color:var(--leclerc);}.sf-mercator{border-color:var(--mercator);color:var(--mercator);}
code{background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:11px;font-family:monospace;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
@media(max-width:700px){.store-cells{grid-template-columns:repeat(3,1fr);}}
@media(max-width:580px){.seg-grid{grid-template-columns:1fr;}.store-cells{grid-template-columns:repeat(2,1fr);}
  .home-hero{padding:36px 18px 28px!important;}.hero-title{font-size:28px!important;}.store-strip{grid-template-columns:repeat(2,1fr)!important;}
  .cat-grid{grid-template-columns:repeat(3,1fr)!important;}.top-grid{grid-template-columns:1fr!important;}.quick-btns{flex-direction:column;}}

/* ── HOME PAGE ── */
.home-wrap{max-width:920px;margin:0 auto;padding:0 16px 60px;}

/* Hero – svetla tema, brez temnega okvirja */
.home-hero{
  background:var(--bg);
  color:var(--text);
  padding:44px 24px 36px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.home-hero::before{display:none;}
.home-hero::after{display:none;}

.hero-logo{
  font-size:17px;font-weight:800;letter-spacing:-.5px;margin-bottom:18px;
  display:flex;align-items:center;justify-content:center;gap:5px;color:var(--muted);
}
.hero-logo span{color:var(--accent);}

.hero-title{
  font-size:34px;font-weight:900;line-height:1.18;margin-bottom:9px;
  letter-spacing:-.5px;color:var(--text);
}
.hero-title em{font-style:normal;color:var(--accent);}
.hero-sub{font-size:14px;color:var(--muted);margin-bottom:26px;}

.hero-search{max-width:520px;margin:0 auto 22px;position:relative;}
.hero-search input{
  width:100%;padding:13px 50px 13px 18px;
  border:2px solid var(--border);border-radius:14px;font-size:15px;
  background:#fff;color:var(--text);outline:none;
  box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .2s;
}
.hero-search input::placeholder{color:#94a3b8;}
.hero-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.12);}
.hero-search-btn{
  position:absolute;right:9px;top:50%;transform:translateY(-50%);
  background:var(--accent);border:none;border-radius:9px;
  width:34px;height:34px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.hero-search-btn:hover{background:#d97706;}

/* Store pills – svetle z barvnimi obrubami */
.store-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:580px;margin:0 auto;}
.store-pill{
  padding:8px 10px;border-radius:10px;font-size:11px;font-weight:800;
  text-align:center;letter-spacing:.3px;border:2px solid;
  transition:transform .15s,box-shadow .15s;cursor:pointer;background:#fff;
}
.store-pill:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.sp-lidl   {color:var(--lidl);    border-color:rgba(0,80,170,.25);  background:#fff;}
.sp-hofer  {color:var(--hofer);   border-color:rgba(226,0,26,.25);  background:#fff;}
.sp-spar   {color:var(--spar);    border-color:rgba(0,122,51,.25);  background:#fff;}
.sp-leclerc{color:var(--leclerc); border-color:rgba(0,56,130,.25);  background:#fff;}
.sp-mercator{color:var(--mercator);border-color:rgba(204,0,51,.25); background:#fff;}
.store-pill .sp-status{font-size:9px;font-weight:600;margin-top:2px;opacity:.65;}

.hero-stats{
  margin-top:16px;display:flex;align-items:center;justify-content:center;
  gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted);
}
.hero-stat-pill{
  display:flex;align-items:center;gap:5px;
  background:#f8fafc;border:1px solid var(--border);
  padding:4px 12px;border-radius:20px;
}
.hero-stat-pill b{color:var(--text);font-size:13px;}
/* stara kompatibilnost */
.hero-stat{display:flex;align-items:center;gap:5px;}
.hero-stat b{color:var(--text);font-size:14px;}

/* SECTION TITLES */
.home-section{margin:28px 0 14px;}
.home-section h2{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--text);padding-bottom:10px;border-bottom:2px solid var(--border);}
.home-section h2 span{font-size:13px;font-weight:500;color:var(--muted);}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.cat-tile{background:#fff;border-radius:12px;padding:13px 6px;text-align:center;cursor:pointer;
  border:1.5px solid var(--border);transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.cat-tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 18px rgba(245,158,11,.12);}
.cat-tile.active{background:linear-gradient(135deg,#1e293b,#334155);border-color:var(--text);}
.cat-tile .ct-em{font-size:26px;margin-bottom:5px;}
.cat-tile .ct-name{font-size:11px;font-weight:700;color:var(--muted);line-height:1.2;}
.cat-tile.active .ct-name{color:#fff;}
.cat-tile .ct-count{font-size:10px;color:var(--muted);margin-top:2px;}
.cat-tile.active .ct-count{color:rgba(255,255,255,.6);}

/* TOP DEALS */
.top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.deal-card{background:#fff;border-radius:12px;padding:14px;border:1.5px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.deal-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#cbd5e1;}
.deal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.deal-card.dc-lidl::before{background:var(--lidl);}
.deal-card.dc-hofer::before{background:var(--hofer);}
.deal-card.dc-spar::before{background:var(--spar);}
.deal-card.dc-leclerc::before{background:var(--leclerc);}

// ════════════════════════════════════ UJEMANJE S KATALOGOM ══════════
function findMatch(storeProds, seg){
  if(!storeProds||!storeProds.length) return null;
  const scored = storeProds.map(p=>{
    const nm=(p.name||'').toLowerCase(); let sc=0;
    for(const kw of seg.inc){ if(nm.includes(kw.toLowerCase())) sc+=2; }
    for(const kw of (seg.exc||[])){ if(nm.includes(kw.toLowerCase())) sc-=10; }
    return {...p,_sc:sc};
  }).filter(p=>p._sc>0);
  if(!scored.length) return null;
  scored.sort((a,b)=>b._sc-a._sc||(a.price_per_100g||a.price)-(b.price_per_100g||b.price));
  const m=scored[0];
  return {n:m.name,p:m.price,orig:m.orig_price||null,w:m.weight_str||'',wg:m.weight_g,pu:m.price_per_100g};
}

function getStoreData(storeKey){
  const cd=window.CATALOG_DATA;
  if(!cd||!cd.raw) return null;
  return cd.raw[storeKey]||null;
}

function getSegmentPrices(seg){
  const cd=window.CATALOG_DATA;
  const hasCatalog = cd&&cd.raw&&Object.values(cd.raw).some(a=>a&&a.length);
  const skeys=['lidl','hofer','spar','leclerc','mercator'];
  const result={};

  // 1. Najprej preveri cd.matched — tam so ročno dodani segmenti (Sensodyne, Ajvar, itd.)
  //    Ujemanje po: segment id, ključni besedi iz names, ali segmentovi inc ključi
  if(cd&&cd.matched){
    const segKw = [seg.id.replace(/_/g,' '), ...seg.inc].map(s=>s.toLowerCase());
    const hit = cd.matched.find(m=>{
      const mn = m.name.toLowerCase().replace(/[🫙🥒🦷🌸🍠💪🌰🍇🍓]/g,'').trim();
      return segKw.some(kw=>kw.length>3 && mn.includes(kw));
    });
    if(hit && Object.keys(hit.stores).length>0){
      for(const k of skeys){
        const s=hit.stores[k];
        result[k] = s ? {n:s.name,p:s.price,orig:s.orig_price||null,w:s.weight_str||'',wg:s.weight_g,pu:s.price_per_100g} : null;
      }
      // Če najdemo vsaj en zadetke, vrni takoj
      if(Object.values(result).some(Boolean)) return result;
    }
  }

  // 2. Iskanje v surovih PDF podatkih (za segmente iz katalogov)
  if(hasCatalog){
    for(const k of skeys){
      const m=findMatch(cd.raw[k],seg);
      if(m) result[k]=m;
    }
    // Če najdemo vsaj en zadetek v raw, vrni
    if(Object.values(result).some(Boolean)) return result;
  }

  // 3. Fallback: DEMO cene
  const dd=DEMO[seg.id]||{};
  for(const k of skeys){
    const d=dd[k];
    if(d) result[k]={n:d.n,p:d.p,orig:d.orig||null,w:d.w,wg:null,pu:null};
    else result[k]=null;
  }
  return result;
}

function bestKey(prices){
  const ks=Object.keys(prices).filter(k=>prices[k]);
  if(!ks.length) return null;
  return ks.reduce((b,k)=>{
    const bp=prices[b].pu||prices[b].p, kp=prices[k].pu||prices[k].p;
    return kp<bp?k:b;
  },ks[0]);
}
function maxSaving(prices){
  const vals=Object.values(prices).filter(Boolean).map(v=>v.pu||v.p);
  if(vals.length<2) return 0;
  return Math.round((Math.max(...vals)-Math.min(...vals))/Math.max(...vals)*100);
}

// ═══════════════════════════════════════ RENDER COMPARE ═════════════
function renderCompare(){
  const cd=window.CATALOG_DATA;
  const isDemo=!cd||!cd.raw||!Object.values(cd.raw).some(a=>a&&a.length);
  const q=S.search.toLowerCase().trim();
  let segs=SEGMENTS.filter(s=>S.cat==='vse'||s.cat===S.cat);
  if(q) segs=segs.filter(s=>s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q));
  if(S.sort==='saving') segs.sort((a,b)=>maxSaving(getSegmentPrices(b))-maxSaving(getSegmentPrices(a)));
  else if(S.sort==='avail') segs.sort((a,b)=>{
    const ap=getSegmentPrices(a),bp=getSegmentPrices(b);
    return Object.values(bp).filter(Boolean).length-Object.values(ap).filter(Boolean).length;
  });
  else segs.sort((a,b)=>a.name.localeCompare(b.name,'sl'));

  if(!segs.length) return `<div class="empty"><div style="font-size:48px">🔍</div><p>Ni zadetkov za "<b>${q}</b>".</p></div>`;

  const notice=isDemo?`<div class="demo-notice">⚠ <b>Vzorčni podatki</b> – prikazane so okvirne cene za maj 2025. Za dejanske cene naloži PDF kataloge (zavihek Navodila).</div>`:
    `<div class="demo-notice" style="background:#f0fdf4;border-color:var(--best);color:#166534;">✅ Naloženi katalogi: ${cd.generated||''} · ${Object.values(cd.stats||{}).reduce((a,b)=>a+b,0)} izdelkov</div>`;

  const cards=segs.map(seg=>{
    const prices=getSegmentPrices(seg);
    const best=bestKey(prices);
    const saving=maxSaving(prices);
    const avail=Object.values(prices).filter(Boolean).length;
    const cells=['lidl','hofer','spar','leclerc','mercator'].map(k=>{
      const d=prices[k];
      if(!d) return `<div class="sc na"><div class="sc-store ${k}">${k==='leclerc'?'E.LEC':k.toUpperCase()}</div><div class="sc-na">Ni v katalogu</div></div>`;
      const isBest=k===best, hasOrig=d.orig&&d.orig>d.p;
      return `<div class="sc${isBest?' best':''}">
        ${isBest?'<span class="best-tag">✓ NAJBOLJŠE</span>':''}
        <div class="sc-store ${k}">${k==='leclerc'?'E.LECLERC':k==='mercator'?'MERCATOR':k.toUpperCase()}</div>
        <div class="sc-name">${d.n}</div>
        ${d.w?`<div class="sc-w">${d.w}</div>`:''}
        ${hasOrig?`<div class="sc-orig">${d.orig.toFixed(2)} €</div>`:''}
        <div class="sc-price${hasOrig?' promo':''}">${d.p.toFixed(2)} €</div>
        ${d.pu?`<div class="sc-unit">${d.pu.toFixed(2)} €/100g</div>`:''}
        <button class="sc-add" onclick="addSeg('${esc(seg.name)}','${esc(d.n)}',${d.p},'${k}','${esc(d.w||'')}',${d.orig||null},'${seg.cat}')">+ V seznam</button>
      </div>`;
    }).join('');
    return `<div class="seg-card">
      <div class="seg-hdr"><span class="seg-emoji">${seg.emoji}</span><div><div class="seg-title">${seg.name}</div><div class="seg-desc">${seg.desc}</div></div></div>
      <div class="store-cells">${cells}</div>

// PROTEIN MULTIPLIERJI (šport fokus na beljakovinah):
//   Beljakovinski izdelki (meso, mlečni, jajca):
//     zmeren = 1.15x  →  šport = 1.15 × 1.5 = 1.73x (+50% vs zmeren)
//   Ostala hrana (ogljikohidrati, sadje, zelenjava):
//     zmeren = 1.15x  →  šport = 1.25x
//   Čistila/higiena:
//     zmeren = 1.10x  →  šport = 1.25x
function calcM(r){
  const h=S.household; let m=1;
  if(r.clean){
    if(h.activity==='zmeren') m*=1.10;
    if(h.activity==='sport')  m*=1.25;
  } else if(r.protein){
    // BELJAKOVINSKI: šport +50% več kot zmeren
    if(h.activity==='zmeren') m*=1.15;
    if(h.activity==='sport')  m*=1.73; // = 1.15 × 1.5
  } else {
    // OSTALA HRANA: normalno povečanje
    if(h.activity==='zmeren') m*=1.15;
    if(h.activity==='sport')  m*=1.25;
  }
  if(!r.clean){if(h.age==='mlad')m*=1.1;if(h.age==='senior')m*=.85;}
  return m;
}
function calcRecoQty(r){
  const h=S.household; let base=r.base*h.persons*calcM(r);
  (h.childAges||[]).forEach(a=>{
    base+=r.base*(r.clean?(a==='dojenček'?.3:a==='otrok'?.2:.25):(a==='dojenček'?.15:a==='otrok'?.6:.85));
  });
  return r.unit==='kos'?Math.ceil(base):Math.round(base*10)/10;
}

// Ugotovi kategorijo iz imena artikla – pregleda ključne besede segmentov
function guessCat(name) {
  if (!name) return 'ostalo';
  const nm = name.toLowerCase();
  for (const seg of SEGMENTS) {
    for (const kw of (seg.inc || [])) {
      if (kw.length > 2 && nm.includes(kw.toLowerCase())) return seg.cat;
    }
  }
  return 'ostalo';
}

function addSeg(segName, prodName, price, store, weight, origPrice, segCat){
  addToList(prodName||segName, price, store, weight, origPrice, 1, segCat||'ostalo');
}
function addToList(name, price, store, weight, orig_price, qty, cat){
  qty = qty||1;
  // Vedno poskusi ugotoviti pravo kategorijo (tudi za stare artikle brez cat)
  cat = (cat && cat !== 'ostalo') ? cat : guessCat(name);
  const ex = S.list.find(i=>i.name===name&&i.store===store);
  if(ex){ ex.qty+=qty; }
  else S.list.push({id:uid(),name,price:price||0,store,weight_str:weight||'',orig_price:orig_price||null,qty,checked:false,cat});
  saveList(); toast(`✓ ${name} dodano`);
}

function asCalcQty(base, isProtein, activity, age, persons) {
  let m = 1.0;
  if (isProtein) {
    if (activity === 'zmeren') m *= 1.15;
    if (activity === 'sport')  m *= 1.73;
  } else {
    if (activity === 'zmeren') m *= 1.15;
    if (activity === 'sport')  m *= 1.25;
  }
  if (age === 'mlad')   m *= 1.10;
  if (age === 'senior') m *= 0.85;
  return base * persons * m;
}

function asCheapest(segId) {
  const seg = SEGMENTS.find(s => s.id === segId);
  if (!seg) return null;
  const prices = getSegmentPrices(seg);
  let bestKey = null, bestP = Infinity;
  for (const [k, v] of Object.entries(prices)) {
    if (v && v.p < bestP) { bestP = v.p; bestKey = k; }
  }
  if (!bestKey) return null;
  const v = prices[bestKey];
  return { store: bestKey, price: v.p, name: v.n, wg: v.wg, ws: v.w, seg };
}

function asBuyUnits(neededQty, unit, match) {
  // Returns { packs, unitCost, totalCost, qtyStr }
  if (!match) return null;
  if (unit === 'kos') {
    const packs = Math.max(1, Math.round(neededQty));
    return { packs, unitCost: match.price, totalCost: packs * match.price, qtyStr: `${packs}× kos` };
  }
  const neededG = (unit === 'kg' || unit === 'L') ? neededQty * 1000 : neededQty;
  const packG = match.wg || 1000;
  const packs = Math.max(1, Math.ceil(neededG / packG));
  const qtyStr = unit === 'kg' ? `${(packs*packG/1000).toFixed(1)} kg`
               : unit === 'L'  ? `${(packs*packG/1000).toFixed(1)} L`
               : `${packs}×`;
  return { packs, unitCost: match.price, totalCost: packs * match.price, qtyStr };
}

// Pomožna: rekonstruiraj qtyStr za dane pakete
function asQtyStrCalc(packs, unit, wg) {
  if (unit === 'kos') return `${packs}× kos`;
  const g = wg || 1000;
  if (unit === 'kg') return `${(packs * g / 1000).toFixed(1)} kg`;
  if (unit === 'L')  return `${(packs * g / 1000).toFixed(1)} L`;
  return `${packs}×`;
}

function generateAutoShop() {
  const { budget, age, activity, persons } = AS;
  let remaining = budget;  // ← strogo sledenje preostalemu budgetu

  // 1. Pripravi vse možne artikle
  const candidates = AS_CATALOG
    .filter(([,,,,,,sportOnly]) => !sportOnly || activity === 'sport')
    .map(([segId, baseQty, unit, priority, cat, isProtein]) => {
      const qty     = asCalcQty(baseQty, isProtein, activity, age, persons);
      const match   = asCheapest(segId);
      if (!match) return null;
      const buy     = asBuyUnits(qty, unit, match);
      if (!buy) return null;
      return { segId, cat, priority, unit, match,
               recPacks: buy.packs,       // priporočeno število paketov
               pricePerPack: match.price  // cena enega paketa
             };
    })
    .filter(Boolean)
    // Razvrstitev: prioriteta najprej, znotraj prioritete cenejše najprej
    .sort((a, b) => a.priority - b.priority || a.pricePerPack - b.pricePerPack);

  // 2. Greedy dodelitev — nikoli ne preseži remaining
  const included = [], skipped = [];

  for (const item of candidates) {
    const { pricePerPack, recPacks } = item;

    if (pricePerPack > remaining) {
      // Ne moremo si privoščiti niti 1 paketa
      skipped.push({ ...item, reason: 'ni budgeta' });
      continue;
    }

    // Koliko paketov si lahko privoščimo?
    const maxAffordable = Math.floor(remaining / pricePerPack);
    const actualPacks   = Math.min(recPacks, maxAffordable);

    if (actualPacks < 1) {
      skipped.push({ ...item, reason: 'ni budgeta' });
      continue;
    }

    const totalCost = actualPacks * pricePerPack;
    remaining -= totalCost;  // odštej takoj

    included.push({
      ...item,
      buy: {
        packs:     actualPacks,
        totalCost,
        qtyStr:    asQtyStrCalc(actualPacks, item.unit, item.match.wg),
        reduced:   actualPacks < recPacks,
        recPacks,
      }
    });
  }

  const spent = budget - remaining;

  // 3. Povzetek po trgovinah
  const storeSummary = {};
  for (const item of included) {
    const s = item.match.store;
    if (!storeSummary[s]) storeSummary[s] = { total: 0, items: 0 };
    storeSummary[s].total += item.buy.totalCost;
    storeSummary[s].items += item.buy.packs;
  }

  AS.result = { included, skipped, spent, remaining, storeSummary, budget };
  renderMain();
  setTimeout(() => {
    document.getElementById('asResult')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

    // Počakaj na render, nato scrollaj na segment
    S.search='';
    switchTab(tab);
    setTimeout(()=>{
      const cards=document.querySelectorAll('.seg-card');
      cards.forEach(c=>{
        if(c.textContent.includes(SEGMENTS.find(s=>s.id===segId)?.name?.slice(2)||'')) {
          c.scrollIntoView({behavior:'smooth',block:'center'});
          c.style.outline='3px solid var(--accent)';
          setTimeout(()=>c.style.outline='',2000);
        }
      });
    },150);
    return;
  }
  switchTab(tab);
}

function saveArchiveFull(arr) { saveLS('cenesi_archive', arr); }

  // keywords: array besed ki se iščejo v imenih artiklov v arhivu
  {id:'pralni',    name:'Pralni prašek / gel',          emoji:'🧺', intervalDays:45,
   keywords:['pralni','ariel','persil','vizir','duel gel','omino','detergent za pranje','pralne kapsul']},
  {id:'tab_pomiv', name:'Pomivalne kapsule Finish',     emoji:'🧽', intervalDays:60,
   keywords:['finish','somat','kapsule za pomivalni','tablete za strojno','tablete pomivalni','pomivalni stroj','jar kapsule','w5 tablete']},
  {id:'cistilo',   name:'Čistilo za dom',               emoji:'🧹', intervalDays:60,
   keywords:['čistilo','domestos','cillit','arf univer','wc čist','wc gel']},
  {id:'pomivanje', name:'Pomivanje posode (tekoče)',    emoji:'🧴', intervalDays:45,
   keywords:['pomivanje posode','jar','pril','fairy','za posodo','pomivalno srstvo','dexal detergent za posodo']},

   keywords:['sensodyne','zobna pasta','colgate','aquafresh','elmex']},
  {id:'mehcalec',  name:'Mehčalec perila Silan/Violeta',emoji:'🌸', intervalDays:45,

];

function saveCurrentListToArchive() {
  if(!S.list.length){ toast('Seznam je prazen.'); return; }
  const now = new Date();
  const archive = getArchive();
  const entry = {
    id:        now.getTime(),
    savedAt:   now.toISOString(),
    monthKey:  `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`,
    monthLabel:now.toLocaleDateString('sl-SI',{month:'long',year:'numeric'}),
    items:     S.list.map(i=>({...i})),
    total:     S.list.reduce((s,i)=>s+i.price*i.qty,0),
    saving:    S.list.reduce((s,i)=>s+(i.orig_price?(i.orig_price-i.price)*i.qty:0),0),
    storeSummary: (() => {
      const ss={};
      S.list.forEach(i=>{ if(!ss[i.store])ss[i.store]={total:0,items:0}; ss[i.store].total+=i.price*i.qty; ss[i.store].items+=i.qty; });
      return ss;
    })(),
  };
  archive.unshift(entry);
  saveArchiveFull(archive);
  toast(`✅ Shranjen v arhiv: ${entry.monthLabel}`);
  renderMain();
}

function deleteArchiveEntry(id) {
  if(!confirm('Izbriši ta arhivski vnos?')) return;
  saveArchiveFull(getArchive().filter(e=>e.id!==id));
  renderMain();
}

function hygieneStatus(segId, archive) {
  const hyg = HYGIENE_SEGS.find(h=>h.id===segId);
  const keywords = hyg?.keywords || [segId];  // ← prave ključne besede, ne ID
  const intervalDays = hyg?.intervalDays || 45;
  let lastDate = null;
  for(const entry of archive) {
    // Išče katerokoli ključno besedo v imenu artikla (case-insensitive)
    const found = entry.items.find(i=>{
      const nm = i.name.toLowerCase();
      return keywords.some(kw=>nm.includes(kw.toLowerCase()));
    });
    if(found){ lastDate = new Date(entry.savedAt); break; }
  }
  if(!lastDate) return {status:'never', label:'Ni v arhivu', days:null};
  const days = Math.round((Date.now()-lastDate.getTime())/86400000);
  if(days < intervalDays*0.7) return {status:'ok',   label:`Kupljeno pred ${days} dnevi`, days};
  if(days < intervalDays)     return {status:'soon', label:`Kmalu potrebno (${days} dni)`, days};
  return {status:'due', label:`Potrebno! (${days} dni)`, days};
}

function renderArchive() {
  const archive = getArchive();
  const SCOLORS={lidl:'var(--lidl)',hofer:'var(--hofer)',spar:'var(--spar)',leclerc:'var(--leclerc)',mercator:'var(--mercator)','—':'#64748b'};
  const SNAMES={lidl:'LIDL',hofer:'HOFER',spar:'SPAR',leclerc:'E.LECLERC',mercator:'MERCATOR','—':'?'};

  // Hygiene tracker sidebar
  const hygHTML = HYGIENE_SEGS.map(h=>{
    const st = hygieneStatus(h.id, archive);
    const cls = {ok:'hyg-ok',soon:'hyg-soon',due:'hyg-due',never:'hyg-never'}[st.status];
    return `<div class="hyg-item">
      <span style="font-size:16px">${h.emoji}</span>
      <div style="flex:1"><div class="hyg-name">${h.name}</div><div class="hyg-when">${st.label}</div></div>
      <span class="hyg-badge ${cls}">${{ok:'✓ OK',soon:'⏰ Kmalu',due:'⚠ Potrebno',never:'—'}[st.status]}</span>
    </div>`;
  }).join('');

  const sidebar = `<div>
    <div class="hyg-card">
      <h3>🔁 Higienski tracker <span style="font-size:11px;color:var(--muted);font-weight:400">— kdaj zadnjič kupljeno</span></h3>
      ${hygHTML}
      <div style="padding:10px 15px;font-size:11px;color:var(--muted)">Na podlagi arhiva zadnjih nakupov.</div>
    </div>
    ${archive.length>0?`
    <div class="hyg-card" style="margin-top:14px;">
      <h3>📊 Skupno porabljeno</h3>
      ${(() => {
        const totByMonth={};
        archive.forEach(e=>{ if(!totByMonth[e.monthLabel])totByMonth[e.monthLabel]=0; totByMonth[e.monthLabel]+=e.total; });
        return Object.entries(totByMonth).slice(0,6).map(([m,t])=>`
          <div style="padding:8px 15px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:12px">${m}</span>
            <span style="font-size:14px;font-weight:800">${t.toFixed(2)} €</span>
          </div>`).join('');
      })()}
    </div>`:''}
  </div>`;

  // Grupacija po mesecu
  const byMonth={};
  archive.forEach(e=>{ if(!byMonth[e.monthKey])byMonth[e.monthKey]={label:e.monthLabel,entries:[]}; byMonth[e.monthKey].entries.push(e); });

  const mainHTML = Object.keys(byMonth).length===0 ?
    `<div class="arch-empty"><div style="font-size:48px;margin-bottom:12px">📦</div><p>Arhiv je prazen.<br>Shrani nakupovalni seznam z gumbom <b>Shrani v arhiv</b>.</p></div>` :
    Object.entries(byMonth).map(([key,month])=>{
      const monthTotal = month.entries.reduce((s,e)=>s+e.total,0);
      const monthItems = month.entries.reduce((s,e)=>s+e.items.length,0);
      const monthSaving = month.entries.reduce((s,e)=>s+(e.saving||0),0);
      const allStores = {};
      month.entries.forEach(e=>Object.keys(e.storeSummary||{}).forEach(s=>{ allStores[s]=SCOLORS[s]; }));

      const entriesHTML = month.entries.map(entry=>{
        const d = new Date(entry.savedAt).toLocaleDateString('sl-SI',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
        const storeDotsHTML = Object.keys(entry.storeSummary||{}).map(s=>`<span class="arch-store-dot" style="background:${SCOLORS[s]}" title="${SNAMES[s]}"></span>`).join('');
        const itemsHTML = entry.items.map(i=>`
          <div class="arch-item-row">
            <span class="arch-item-name">${i.name}${i.qty>1?` ×${i.qty}`:''}</span>
            <span class="arch-item-store" style="background:${SCOLORS[i.store]||'#64748b'}">${SNAMES[i.store]||i.store}</span>
            <span class="arch-item-price">${(i.price*i.qty).toFixed(2)} €</span>
          </div>`).join('');
        return `<div class="arch-entry">
          <div class="arch-entry-hdr">
            <span class="arch-date">📅 ${d}</span>
            <div class="arch-store-dots">${storeDotsHTML}</div>
            <span class="arch-entry-total">${entry.total.toFixed(2)} €</span>
            <button class="arch-delete-btn" onclick="deleteArchiveEntry(${entry.id})" title="Izbriši">🗑</button>
          </div>
          <details><summary style="font-size:11px;color:var(--muted);cursor:pointer">${entry.items.length} artiklov</summary>
            <div style="margin-top:6px">${itemsHTML}</div>
          </details>
        </div>`;
      }).join('');

      return `<div class="arch-month-card">
        <div class="arch-month-hdr">
          <div>
            <h3>📅 ${month.label}</h3>
            <div class="arch-count">${month.entries.length} shranjenih seznamov · ${monthItems} artiklov</div>
          </div>
          <div class="arch-total">${monthTotal.toFixed(2)} €</div>
        </div>
        <div class="arch-stats-row">
          <div class="arch-stat"><div class="arch-stat-val">${monthItems}</div><div class="arch-stat-lbl">artiklov</div></div>
          <div class="arch-stat"><div class="arch-stat-val">${monthTotal.toFixed(2)} €</div><div class="arch-stat-lbl">porabljeno</div></div>
          <div class="arch-stat"><div class="arch-stat-val" style="color:var(--best)">${monthSaving.toFixed(2)} €</div><div class="arch-stat-lbl">prihrankov</div></div>
          <div class="arch-stat"><div class="arch-stat-val">${Object.keys(allStores).length}</div><div class="arch-stat-lbl">trgovin</div></div>
        </div>
        ${entriesHTML}
      </div>`;
    }).join('');

  return `<div class="arch-layout">
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
        <h2 style="font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;">📦 Arhiv nakupov <span style="font-size:12px;font-weight:500;color:var(--muted)">${archive.length} vnosov</span></h2>
        <button class="arch-save-btn" onclick="switchTab('list')">← Nazaj na seznam</button>
      </div>
      ${mainHTML}
    </div>
    ${sidebar}
  </div>`;
}

}
